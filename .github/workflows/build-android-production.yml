name: Build Android AAB (Production)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expo/package-lock.json

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 16.x
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize EAS project for CI
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "$EAS_PROJECT_ID" ]; then
            # Preferred path: explicitly link the known EAS project.
            eas init --id "$EAS_PROJECT_ID" --non-interactive
          else
            # Fallback: create/link using app slug + EXPO_TOKEN account when project ID is not provided.
            eas init --non-interactive --force
          fi

      - name: Prepare Android signing credentials for CI
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required_vars=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required Android signing secrets: ${missing_vars[*]}" >&2
            echo "Create or export the Android keystore outside CI, then add these secrets before running the workflow." >&2
            exit 1
          fi

          mkdir -p .eas
          umask 077
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > .eas/android-upload-keystore.jks
          chmod 600 .eas/android-upload-keystore.jks

          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": ".eas/android-upload-keystore.jks",
                "keystorePassword": "$ANDROID_KEYSTORE_PASSWORD",
                "keyAlias": "$ANDROID_KEY_ALIAS",
                "keyPassword": "$ANDROID_KEY_PASSWORD"
              }
            }
          }
          EOF

      - name: Build Android AAB for production
        run: eas build --platform android --profile production-ci --non-interactive
