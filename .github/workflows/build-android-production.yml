name: Build Android AAB (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expo/package-lock.json

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: 16.x
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize EAS project for CI
        run: |
          if [ -n "${{ secrets.EAS_PROJECT_ID }}" ]; then
            eas init --id "${{ secrets.EAS_PROJECT_ID }}" --non-interactive
          else
            eas init --non-interactive
          fi

      - name: Build Android AAB for production
        run: eas build --platform android --profile production --non-interactive
